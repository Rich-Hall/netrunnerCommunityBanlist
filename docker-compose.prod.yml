# Production Compose stack. See DEPLOY.md.

services:
  web:
    build: .
    env_file:
      - .env
    environment:
      FLASK_APP: wsgi:app
      FLASK_DEBUG: "0"
      DATABASE_URL: sqlite:////app/data/app.db
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env — see .env.example}
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 wsgi:app
    ports:
      - "80:5000"
    volumes:
      - banlist-data:/app/data
    restart: unless-stopped

volumes:
  banlist-data:
